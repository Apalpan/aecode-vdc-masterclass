    <meta name="theme-color" content="#0E1121" />
    <script>
      // Flash-free theme: aplica el tema guardado antes del primer paint. Oscuro AECODE por defecto.
      (function () {
        try {
          var t = localStorage.getItem('aecode-vdc-theme');
          if (t !== 'dark' && t !== 'light') t = 'dark';
          document.documentElement.dataset.theme = t;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark';
        }
        document.documentElement.dataset.deck = 'vdc';
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
